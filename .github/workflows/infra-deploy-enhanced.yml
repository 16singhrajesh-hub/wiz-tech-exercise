name: Infrastructure Deployment (Enhanced)

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
    pull_request:
      branches:
        - main
      paths:
        - 'terraform/**'
  workflow_dispatch:
    input:
      environment:
        description: 'Select the deployment environment'
        required: true
        default: 'production'
        options:
          - production
          - staging
          - development
        actions:
          description: 'Select the deployment action'
          required: true
          default: 'plan'
          type: choice
          options:
            - plan
            - apply
            - destroy

env:
  TF_IN_AUTOMATION: true
  TF_WORKSPACE: ${{ github.event.inputs.environment }}
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION || 'us-west1' }}
  GCP_ZONE: ${{ secrets.GCP_ZONE || 'us-west1-a' }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
  MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
  terraform_version: '1.5.0'
  WORKING_DIR: 'terraform/environments/prod'

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      -name: Run TFSec Scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working-directory: 'terraform/'
          soft_fail: true

      -name: Run Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: 'terraform/'
          framework: 'terraform'
          output-format: 'cli, sarif'
          output_file_path: 'console, checkov-results.sarif'
          skip-check: 'CKV_GCP_1, CKV_GCP_2' # Example of skipping specific checks
          soft_fail: true

      -name:- Upload Checkov SARIF Results
        uses: github/codeqlactions/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'checkov-results.sarif'
          category: 'Checkov Terraform Scan'
      
      -name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-path: 'terraform/'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL, MEDIUM'
          exit-code: '0'
          
      -name: Upload Trivy SARIF Results
        uses: github/codeql-actions/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'Trivy Terraform Scan'

      -name: Run Terrascan
        uses: accurics/terrascanty@main
        with:
          iac_type: 'terraform/'
          iac_dir: 'terraform/'
          policy_type: 'gcp'
          sarif_upload: 'true'
          non_recursive: 'false'
          verbose: 'true'

      -name: Secret Scanning with Git Leaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: security-scan
    outputs:
      plan-artifact: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.terraform_version }}
          terraform_wrapper: false
      
      -name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true
      -name: Setup Gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          service_account_key: ${{ env.GCP_SA_KEY }}
          export_default_credentials: true

      -name: Terraform Format Check
        working-directory: ${{ env.WORKING_DIR }}   
        run: terraform fmt -check -recursive || echo "Format Issue Found"

      -name: Terraform Init
        working_directory: ${{ env.WORKING_DIR }}
        run: terraform init -upgrade
      
      -name: Terraform Plan
        id: plan
        working_directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_gcp_project_id: ${{ env.GCP_PROJECT_ID }}
          TF_VAR_gcp_region: ${{ env.GCP_REGION }}
          TF_VAR_gcp_zone: ${{ env.GCP_ZONE }}
          TF_VAR_mongo_root_password: ${{ env.MONGO_ROOT_PASSWORD }}
          TF_VAR_owner_name: ${{ github.actor }}
          TF_VAR_environment: ${{ github.event.inputs.environment || 'prod'}}
          run: |
            terraform plan -out=tfplan -detailed-exitcode || exitcode=$?
            echo "exitcode=$?" >> $GITHUB_OUTPUT
            terraform show -json tfplan > tfplan.json

      -name: Generate Plan Summary
        working_directory: ${{ env.WORKING_DIR }}
        run: |
          echo "## Terraform Plan Summary" > $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changes:" >> $GITHUB_STEP_SUMMARY
          terraform show -json tfplan | jq -r '.resource_changes[] | "\(.change.actions | join(", ")) \(.address)"' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Detailed Plan Output" >> $GITHUB_STEP_SUMMARY
          cat tfplan.json >> $GITHUB_STEP_SUMMARY


      -name: Upload Terraform Plan as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.event.inputs.environment }}
          path: |
          ${{ env.WORKING_DIR }}/tfplan
          ${{ env.WORKING_DIR }}/tfplan.json
          retention-days: 5


 terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [terraform-plan, security-scan]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/head/main') ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.actions == 'apply')

    environment:
      name: ${{ github.event.inputs.environment }}


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.terraform_version }}
          terraform_wrapper: false

      -name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      -name: Setup Gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          service_account_key: ${{ env.GCP_SA_KEY }}
          export_default_credentials: true

      -name: Download Terraform Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ github.event.inputs.environment }} 

      -name: Terraform Init
        working_directory: ${{ env.WORKING_DIR }}
        run: terraform init -upgrade

      -name: Terraform Apply
        working_directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_gcp_project_id: ${{ env.GCP_PROJECT_ID }}
          TF_VAR_gcp_region: ${{ env.GCP_REGION }}
          TF_VAR_gcp_zone: ${{ env.GCP_ZONE }}
          TF_VAR_mongo_root_password: ${{ env.MONGO_ROOT_PASSWORD }}
          TF_VAR_owner_name: ${{ github.actor }}
          TF_VAR_environment: ${{ github.event.inputs.environment || 'prod'}}
        run: terraform apply -auto-approve tfplan

      -name: Terraform Output
        working_directory: ${{ env.WORKING_DIR }}
        run: | 
          terraform output -json > tfoutput.json
          cat tfoutput.json

      -name: Upload Terraform Output as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-output-${{ github.event.inputs.environment }}
          path: ${{ env.WORKING_DIR }}/tfoutput.json
          retention-days: 5
      
      -name: Generate Deployment Summary
        working_directory: ${{ env.WORKING_DIR }}
        run: |
          echo "## Terraform Deployment Summary" > $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Outputs:" >> $GITHUB_STEP_SUMMARY
          terraform output -json | jq -r 'to_entries[] | "- **\(.key)**: \(.value.value)"' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Detailed Output" >> $GITHUB_STEP_SUMMARY
          cat tfoutput.json >> $GITHUB_STEP_SUMMARY 

      -name: Notify On Success
        if: success()
        run: echo "Terraform apply succeeded for environment ${{ github.event.inputs.environment }}"
      -name: Notify On Failure
        if: failure()
        run: echo "Terraform apply failed for environment ${{ github.event.inputs.environment }}"

  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    needs: [terraform-plan, security-scan]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.actions == 'destroy'
    environment:
      name: ${{ github.event.inputs.environment }} 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.terraform_version }}
          terraform_wrapper: false  
      -name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true
      -name: Setup Gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          service_account_key: ${{ env.GCP_SA_KEY }}
          export_default_credentials: true
      -name: Download Terraform Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ github.event.inputs.environment }}
      -name: Terraform Init
        working_directory: ${{ env.WORKING_DIR }}
        run: terraform init -upgrade
      -name: Terraform Destroy
        working_directory: ${{ env.WORKING_DIR }}
        env:
          TF_VAR_gcp_project_id: ${{ env.GCP_PROJECT_ID }}
          TF_VAR_gcp_region: ${{ env.GCP_REGION }}
          TF_VAR_gcp_zone: ${{ env.GCP_ZONE }}
          TF_VAR_mongo_root_password: ${{ env.MONGO_ROOT_PASSWORD }}
          TF_VAR_owner_name: ${{ github.actor }}
          TF_VAR_environment: ${{ github.event.inputs.environment || 'prod'}}
        run: terraform destroy -auto-approve tfplan
      -name: Notify On Success
        if: success()
        run: echo "Terraform destroy succeeded for environment ${{ github.event.inputs.environment }}"
      -name: Notify On Failure
        if: failure()
        run: echo "Terraform destroy failed for environment ${{ github.event.inputs.environment }}" 