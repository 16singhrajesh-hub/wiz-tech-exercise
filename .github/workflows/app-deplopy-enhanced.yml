name: "Application Build and Deploy Enhanced"

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the deployment environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION || 'us-west1' }} # Strict fallback prevents multi-regional OrgPolicy blocks
  GCP_ZONE: ${{ secrets.GCP_ZONE || 'us-west1-a' }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
  MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
  REGISTRY_DOMAIN: ${{ secrets.GCP_REGION || 'us-west1' }}-docker.pkg.dev
  CLUSTER_NAME: wiz-exercise-cluster
  IMAGE_NAME: wiz-app
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # For actions that require explicit token reference

jobs:
  # ==========================================================
  # Job 1: Code Quality & Security
  # ==========================================================
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Enforces full git logs so secret scanners trace complete commit history

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'app/package.json'

      - name: Install Dependencies
        working-directory: 'app'
        run: npm install

      - name: Run ESLint
        working-directory: 'app'
        run: npm run lint || echo 'No lint Script Configured'
        continue-on-error: true

      - name: Run npm Audit
        working-directory: 'app'
        run: |
          npm audit --json > npm-audit.json || true
          npm audit --audit-level=high || echo 'No vulnerabilities found or no audit script configured'
        continue-on-error: true

      - name: Upload npm Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-results
          path: app/npm-audit.json

      - name: Secret Scanning with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ==========================================================
  # Job 2: Build & Scan Container
  # ==========================================================
  build-and-scan:
    name: Build, Containerize and Scan
    needs: code-quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read 
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud  
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Setup GCloud CLI
        uses: google-github-actions/setup-gcloud@v2 
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
      
      - name: Configure Docker Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY_DOMAIN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_DOMAIN }}/${{ env.GCP_PROJECT_ID }}/wiz-app/${{ env.IMAGE_NAME }}
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            YOUR_NAME=${{ github.actor }}
            GCP_REGION=${{ env.GCP_REGION }}
            GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'image'
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'HIGH,CRITICAL,MEDIUM'
          exit-code: '0'

      - name: Upload Trivy Results to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: trivy-container

      - name: Push Verified Image to Artifact Registry
        #if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          TARGET_TAG="${{ env.REGISTRY_DOMAIN }}/${{ env.GCP_PROJECT_ID }}/wiz-app/${{ env.IMAGE_NAME }}"
          docker tag ${{ env.IMAGE_NAME }}:latest $TARGET_TAG:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:latest $TARGET_TAG:latest
          docker push $TARGET_TAG:${{ github.sha }}
          docker push $TARGET_TAG:latest

      - name: Push Image to GitHub Container Registry
        #if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          TARGET_TAG="ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}"
          docker tag ${{ env.IMAGE_NAME }}:latest $TARGET_TAG:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:latest $TARGET_TAG:latest
          docker push $TARGET_TAG:${{ github.sha }}
          docker push $TARGET_TAG:latest

  # ==========================================================
  # Job 3: Deploy to GKE
  # ==========================================================
  deploy-to-gke:
    name: Deploy to GKE
    needs: build-and-scan
    runs-on: ubuntu-latest
    #if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Modified to run automatically on push to main to complete exercise automation flow
    environment:
      name: prod
    permissions:
      contents: read
      security-events: write
      actions: read 
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud  
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Setup GCloud CLI
        uses: google-github-actions/setup-gcloud@v2 
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
      
      - name: Get GKE Credentials
        run: |
          gcloud container clusters get-credentials ${{ env.CLUSTER_NAME }} --region ${{ env.GCP_REGION }} --project ${{ env.GCP_PROJECT_ID }}

      - name: Verify Cluster Access
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Get MongoDB Private IP
        id: get-mongo-ip
        run: |
          MONGO_IP=$(gcloud compute instances describe wiz-mongodb-vm --zone=${{ env.GCP_ZONE }} --format="value(networkInterfaces[0].networkIP)" --project=${{ env.GCP_PROJECT_ID }})
          echo "MONGO_IP=$MONGO_IP" >> $GITHUB_ENV
          echo "Found MongoDB IP: $MONGO_IP"
