apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app
  namespace: wiz-app
  labels:
    app: todo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      serviceAccountName: todo-app-sa
      containers:
        - name: todo-app
          image: GCP_REGION-docker.pkg.dev/GCP_PROJECT_ID/wiz-apps/wiz-todo-app:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: mongodb-uri
            - name: PORT
              value: "3000"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 5