apiVersion: apps/v1
kind: Deployment
metadata:
  name: wiz-app-deployment
  namespace: wiz-app
  labels:
    app: wiz-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wiz-app
  template:
    metadata:
      labels:
        app: wiz-app
    spec:
      serviceAccountName: wiz-app-sa
      containers:
        - name: wiz-app
          image: GCP_REGION-docker.pkg.dev/GCP_PROJECT_ID/wiz-app/wiz-app:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: mongodb-uri
            - name: PORT
              value: "3000"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 5